<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="18%" r="90%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="42%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <radialGradient id="blueGlow" cx="50%" cy="48%" r="58%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity=".75"/>
      <stop offset="45%" stop-color="#2563eb" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="neonGold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff7ad"/>
      <stop offset="45%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="hardGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="#000"/>
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="230" fill="url(#blueGlow)"/>

  <circle cx="256" cy="256" r="192" fill="none" stroke="#60a5fa" stroke-width="7" opacity=".48" filter="url(#softGlow)"/>
  <circle cx="256" cy="256" r="148" fill="none" stroke="#facc15" stroke-width="4" opacity=".38"/>

  <path d="M256 68 404 256 256 444 108 256Z" fill="#020617" stroke="#60a5fa" stroke-width="9" filter="url(#softGlow)"/>
  <path d="M256 102 372 256 256 410 140 256Z" fill="url(#neonGold)" filter="url(#hardGlow)"/>
  <path d="M256 158 326 256 256 354 186 256Z" fill="#030712"/>

  <path d="M142 256h228" stroke="#60a5fa" stroke-width="8" stroke-linecap="round" opacity=".76" filter="url(#hardGlow)"/>
  <path d="M256 142v228" stroke="#60a5fa" stroke-width="5" stroke-linecap="round" opacity=".44"/>

  <text x="256" y="284" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="98" font-weight="900" fill="#f8fafc" filter="url(#hardGlow)">E</text>
  <text x="256" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="900" letter-spacing="6" fill="#93c5fd">ELITE</text>

  <path d="M86 86h86M86 86v86M426 86h-86M426 86v86M86 426h86M86 426v-86M426 426h-86M426 426v-86"
        fill="none" stroke="#facc15" stroke-width="6" stroke-linecap="round" opacity=".86"/>
</svg>