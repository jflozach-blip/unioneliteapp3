<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="18%" r="85%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="38%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <radialGradient id="blueGlow" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity=".75"/>
      <stop offset="46%" stop-color="#2563eb" stop-opacity=".24"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="neonGold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff7ad"/>
      <stop offset="42%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="hardGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="22" y="22" width="468" height="468" rx="94" fill="none" stroke="#334155" stroke-width="3" opacity=".55"/>
  <rect x="38" y="38" width="436" height="436" rx="82" fill="none" stroke="#60a5fa" stroke-width="2" opacity=".24"/>

  <circle cx="256" cy="256" r="202" fill="url(#blueGlow)"/>
  <circle cx="256" cy="256" r="178" fill="none" stroke="#60a5fa" stroke-width="5" opacity=".42" filter="url(#softGlow)"/>
  <circle cx="256" cy="256" r="130" fill="none" stroke="#facc15" stroke-width="3" opacity=".34"/>

  <path d="M256 72 394 256 256 440 118 256Z" fill="#020617" stroke="#60a5fa" stroke-width="8" filter="url(#softGlow)"/>
  <path d="M256 104 365 256 256 408 147 256Z" fill="url(#neonGold)" filter="url(#hardGlow)"/>
  <path d="M256 158 323 256 256 354 189 256Z" fill="#030712"/>

  <path d="M156 256h200" stroke="#60a5fa" stroke-width="7" stroke-linecap="round" opacity=".72" filter="url(#hardGlow)"/>
  <path d="M256 150v212" stroke="#60a5fa" stroke-width="5" stroke-linecap="round" opacity=".42"/>

  <text x="256" y="282" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="94" font-weight="900" fill="#f8fafc" filter="url(#hardGlow)">E</text>
  <text x="256" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="900" letter-spacing="6" fill="#93c5fd">ELITE</text>

  <path d="M104 104h62M104 104v62M408 104h-62M408 104v62M104 408h62M104 408v-62M408 408h-62M408 408v-62"
        fill="none" stroke="#facc15" stroke-width="5" stroke-linecap="round" opacity=".82"/>
</svg>